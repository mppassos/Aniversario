<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline - Aniversário Seguro</title>
    <style>
      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(180deg, #f0f4ff 0%, #e8edf5 100%);
        padding: 20px;
      }
      .card {
        background: white;
        border-radius: 20px;
        padding: 40px 30px;
        max-width: 400px;
        text-align: center;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      .icon {
        font-size: 4rem;
        margin-bottom: 20px;
        display: block;
      }
      h1 {
        color: #1a237e;
        font-size: 1.5rem;
        margin-bottom: 12px;
      }
      p {
        color: #6c757d;
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 20px;
      }
      .btn {
        background: linear-gradient(
          135deg,
          #1a237e 0%,
          #0d47a1 50%,
          #1565c0 100%
        );
        color: white;
        border: none;
        padding: 12px 30px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(13, 71, 161, 0.3);
      }
      .retry-hint {
        margin-top: 16px;
        font-size: 0.8rem;
        color: #adb5bd;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <span class="icon">📡</span>
      <h1>Você está offline</h1>
      <p>
        Não foi possível carregar os dados.<br />
        Verifique sua conexão com a internet e tente novamente.
      </p>
      <button class="btn" onclick="window.location.reload()">
        Tentar novamente
      </button>
      <div class="retry-hint">
        Alguns dados podem estar disponíveis no cache do navegador.
      </div>
    </div>
  </body>
</html>
